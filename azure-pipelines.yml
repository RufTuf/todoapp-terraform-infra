trigger:
  branches:
    include:
      - main
      - feature/*
  
pool:
  name: hcl_agent

stages:
  - stage: 
    displayName: built
    jobs:
      - job: 
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/todoapp-terraform-infra'
            backendServiceArm: 'hcl_service_connection'
            backendAzureRmStorageAccountName: 'hclstorage01'
            backendAzureRmContainerName: 'hclcontainer'
            backendAzureRmKey: '.tfstate'

